services:
  agent:
    build: ./python
    restart: unless-stopped
    # Cap JSON log volume. Without this, docker's default json-file driver
    # retains logs unboundedly. The agent logs every LangChain tool call
    # verbatim including large tool outputs (file contents, git diffs) —
    # we've seen multi-gigabyte log files inside days. 5×50m = 250m hard
    # ceiling per container.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    env_file: .env
    environment:
      BACKLOG_PATH: /data/backlog.json
      HEARTH_REPO_PATH: /repos/hearth
      HEARTH_DESKTOP_PATH: /repos/hearth-desktop
      HEARTH_MOBILE_PATH: /repos/hearth-mobile
      # Override Tailscale-hostname WIKIDELVE_URL (from .env) with an
      # in-cluster URL so the agent doesn't need a Tailscale client to
      # reach the knowledge-base API. Relies on the external
      # wikidelve_default network join below. env block takes precedence
      # over env_file entries so this wins.
      WIKIDELVE_URL: ${WIKIDELVE_URL_OVERRIDE:-http://kb-service:8888}
    volumes:
      - agent-data:/data
      - ${REPOS_DIR:-./repos}:/repos
      - ./logs:/app/logs
    ports:
      # Agent HTTP: GitHub webhooks, /stats, /features, /kanban. Tailscale
      # serve exposes this publicly on hearth-agents.walleye-frog.ts.net.
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      langfuse-web:
        condition: service_started
    networks:
      - default
      - wikidelve_default

  # ── Langfuse self-host ─────────────────────────────────────────────────────
  # Two-service Langfuse v2 stack (web + postgres). Keeps all LLM traces
  # on-box so we don't ship prompts/completions to a third party. Web is only
  # bound to loopback; Tailscale serve exposes it on langfuse.walleye-frog.ts.net.
  langfuse-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 3s
      retries: 5

  langfuse-web:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      # Allow signup only until the first org is created; flip to false via
      # env and redeploy once you've claimed the namespace.
      AUTH_DISABLE_SIGNUP: "false"
      TELEMETRY_ENABLED: "false"
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  agent-data:
  langfuse-postgres-data:

networks:
  # Wikidelve's compose stack defines this network; we join as external so
  # the agent can reach kb-service by container name. Created by whoever
  # runs `docker compose up` in the wikidelve repo first — if wikidelve
  # isn't deployed on this host the compose up here will fail with a
  # clear 'network not found' error rather than silently masking the
  # dependency.
  wikidelve_default:
    external: true
